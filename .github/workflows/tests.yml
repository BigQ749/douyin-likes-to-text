name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python dependencies
        run: uv sync
      - name: Run automated tests
        run: uv run python -m unittest discover -s tests -v
